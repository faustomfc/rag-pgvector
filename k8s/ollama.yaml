apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          readinessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: ollama-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ollama-pull
          image: ollama/ollama:latest
          command: ["ollama", "pull", "llama3.2"]
          env:
            - name: OLLAMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: rag-config
                  key: OLLAMA_HOST